<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Myrgic</title>
<meta http-equiv="refresh" content="0; url=https://myrgic.com/">
<link rel="canonical" href="https://myrgic.com/">
<link rel="stylesheet" href="./colors_and_type.css">
<script src="./eigen-form.js"></script>
<style>
  .stage { display:flex; flex-direction:column; align-items:center; justify-content:center;
           min-height:100vh; padding:32px; text-align:center; gap:24px; }
  .mark { width:min(32vmin,300px); aspect-ratio:1; }
  .redirect-note { font-family:var(--font-mono); font-size:11px; color:var(--fg-4);
                   letter-spacing:0.18em; text-transform:uppercase; opacity:0.7; }
</style>
</head>
<body>
<div class="stage">
  <div class="mark"><canvas data-myrgic-mark width="1080" height="1080" style="width:100%;height:100%;display:block;"></canvas></div>
  <h1 class="wordmark" style="font-size:clamp(40px,8vw,72px); margin:0;">myrgic</h1>
  <p class="redirect-note">redirecting → myrgic.com</p>
</div>
<script>setTimeout(function(){location.replace("https://myrgic.com/")},250);</script>
</body>
</html>
